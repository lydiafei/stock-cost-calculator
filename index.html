<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Duck Stock">
    <title>Duck Stock</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #007AFF;
            --success-color: #34C759;
            --danger-color: #FF3B30;
            --warning-color: #FF9500;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #C6C6C8;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1C1C1E;
                --text-primary: #FFFFFF;
                --text-secondary: #8E8E93;
                --border-color: #38383A;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding-bottom: 70px;
        }

        /* Bottom Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 10px;
            cursor: pointer;
            min-height: 50px;
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        /* Header */
        .header {
            background: var(--card-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 14px;
            cursor: pointer;
            padding: 8px;
        }

        /* Main Container */
        .container {
            display: none;
            padding: 16px;
        }

        .container.active {
            display: block;
        }

        /* Summary Card */
        .summary-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .summary-row:not(:last-child) {
            border-bottom: 1px solid var(--border-color);
        }

        .summary-label {
            color: var(--text-secondary);
        }

        .summary-value {
            font-weight: 600;
        }

        .profit { color: var(--success-color); }
        .loss { color: var(--danger-color); }

        /* Stock Card */
        .stock-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .stock-card:active { opacity: 0.8; }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stock-name { font-size: 16px; font-weight: 600; }
        .stock-code { color: var(--text-secondary); margin-left: 8px; }
        .stock-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--warning-color);
            color: white;
        }

        .stock-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stock-info-item {
            display: flex;
            flex-direction: column;
        }

        .stock-info-label { font-size: 12px; color: var(--text-secondary); }
        .stock-info-value { font-size: 15px; font-weight: 500; }

        .price-input {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 14px;
            text-align: right;
            max-width: 100%;
        }

        /* Form Styles */
        .form-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .form-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 16px;
            min-height: 44px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            min-height: 50px;
        }

        .submit-btn:active { opacity: 0.8; }
        .submit-btn:disabled { background: var(--text-secondary); }

        /* Transaction List */
        .transaction-list {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .transaction-item:last-child { border-bottom: none; }

        .transaction-info { flex: 1; }
        .transaction-date { font-size: 13px; color: var(--text-secondary); }
        .transaction-details { font-size: 14px; margin-top: 4px; }

        .transaction-type {
            font-weight: 600;
            margin-right: 8px;
        }
        .transaction-type.buy { color: var(--primary-color); }
        .transaction-type.sell { color: var(--warning-color); }

        .transaction-profit {
            text-align: right;
            min-width: 80px;
        }

        .transaction-profit .profit,
        .transaction-profit .loss { font-weight: 600; font-size: 13px; }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            padding: 8px;
            cursor: pointer;
            margin-left: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            min-height: 44px;
        }

        .modal-btn.cancel { background: var(--border-color); color: var(--text-primary); }
        .modal-btn.confirm { background: var(--primary-color); color: white; }
        .modal-btn.danger { background: var(--danger-color); color: white; }

        /* Chart Container */
        .chart-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

        /* Period Selector */
        .period-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .period-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }

        .period-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Data Textarea */
        .data-textarea {
            width: 100%;
            min-height: 180px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 13px;
            font-family: monospace;
            resize: vertical;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 15px;
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }

        /* Action Buttons */
        .action-btns {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .action-btn.danger {
            color: var(--danger-color);
            border-color: var(--danger-color);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1 id="page-title">Duck Stock</h1>
        <div style="display: flex; gap: 8px;">
            <button class="header-btn" onclick="showImportExport()">数据</button>
        </div>
    </div>

    <!-- Tabs -->
    <div id="tab-portfolio" class="container active">
        <div id="portfolio-summary"></div>
        <div id="portfolio-list"></div>
        <div id="portfolio-empty" class="empty-state" style="display: none;">
            <div class="empty-state-icon">📊</div>
            <div>暂无持仓</div>
            <div style="margin-top: 8px; font-size: 13px;">点击下方"添加交易"记录您的第一笔交易</div>
        </div>
    </div>

    <!-- Add Transaction Tab -->
    <div id="tab-add" class="container">
        <div class="form-section">
            <div class="form-title">添加交易记录</div>
            <form id="trade-form" onsubmit="addTrade(event)">
                <div class="form-group">
                    <label>股票名称</label>
                    <input type="text" id="stock-name" placeholder="例如：Apple" required>
                </div>
                <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="stock-code" placeholder="例如：AAPL" required>
                </div>
                <div class="form-group">
                    <label>交易方向</label>
                    <select id="trade-type" required>
                        <option value="buy">买入</option>
                        <option value="sell">卖出</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>成交价格 ($)</label>
                        <input type="number" id="trade-price" step="0.01" min="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>成交数量</label>
                        <input type="number" id="trade-quantity" step="1" min="1" placeholder="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>交易日期</label>
                    <input type="date" id="trade-date" required style="width: 100%;">
                </div>
                <button type="submit" class="submit-btn">添加交易</button>
            </form>
        </div>
    </div>

    <!-- History Tab -->
    <div id="tab-history" class="container">
        <h1 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">历史记录</h1>
        <div id="history-list"></div>
        <div id="history-empty" class="empty-state" style="display: none;">
            <div class="empty-state-icon">📁</div>
            <div>暂无历史记录</div>
            <div style="margin-top: 8px; font-size: 13px;">已清仓的股票将显示在这里</div>
        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="tab-bar">
        <button class="tab-item active" onclick="switchTab('portfolio')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12V7H5a2 2 0 010-4h14v4"/>
                <path d="M3 5v14a2 2 0 002 2h16v-5"/>
                <path d="M18 12a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
            持仓
        </button>
        <button class="tab-item" onclick="switchTab('add')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            添加交易
        </button>
        <button class="tab-item" onclick="switchTab('history')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            历史记录
        </button>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-overlay" onclick="closeDetailModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- Import/Export Modal -->
    <div id="data-modal" class="modal-overlay" onclick="closeDataModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title">数据管理</div>
            <div class="action-btns">
                <button class="action-btn" onclick="exportData()">导出数据</button>
                <button class="action-btn" onclick="showImport()">导入数据</button>
            </div>
            <div id="import-section" style="display: none; margin-top: 16px;">
                <p style="margin-bottom: 12px; font-size: 13px; color: var(--text-secondary);">粘贴JSON数据：</p>
                <textarea id="import-data" class="data-textarea" placeholder='{"duckStockTrades": [...]}'></textarea>
                <div class="modal-buttons">
                    <button class="modal-btn cancel" onclick="hideImport()">取消</button>
                    <button class="modal-btn confirm" onclick="importData()">导入</button>
                </div>
            </div>
            <button class="action-btn danger" style="width: 100%; margin-top: 16px;" onclick="clearAllData()">清空所有数据</button>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay" onclick="closeConfirmModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title" id="confirm-title">确认操作</div>
            <p id="confirm-message" style="margin-bottom: 16px; color: var(--text-secondary);"></p>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeConfirmModal()">取消</button>
                <button class="modal-btn danger" id="confirm-btn" onclick="confirmAction()">确认</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // ==================== Storage Keys ====================
        const KEYS = {
            trades: 'duckStockTrades',
            prices: 'duckStockPrices',
            hidden: 'duckHiddenStocks'
        };

        function getTrades() {
            const data = localStorage.getItem(KEYS.trades);
            return data ? JSON.parse(data) : [];
        }

        function saveTrades(trades) {
            localStorage.setItem(KEYS.trades, JSON.stringify(trades));
        }

        function getPrices() {
            const data = localStorage.getItem(KEYS.prices);
            return data ? JSON.parse(data) : {};
        }

        function savePrices(prices) {
            localStorage.setItem(KEYS.prices, JSON.stringify(prices));
        }

        function getHiddenStocks() {
            const data = localStorage.getItem(KEYS.hidden);
            return data ? JSON.parse(data) : [];
        }

        function saveHiddenStocks(hidden) {
            localStorage.setItem(KEYS.hidden, JSON.stringify(hidden));
        }

        // ==================== Initialize ====================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('trade-date').value = new Date().toISOString().split('T')[0];
            renderPortfolio();
        });

        // ==================== Tab Navigation ====================
        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach((btn, i) => {
                btn.classList.toggle('active', i === (tab === 'portfolio' ? 0 : tab === 'add' ? 1 : 2));
            });
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');

            if (tab === 'portfolio') renderPortfolio();
            else if (tab === 'history') renderHistory();
            else if (tab === 'add') {
                document.getElementById('page-title').textContent = '添加交易';
            }

            if (tab === 'portfolio') {
                document.getElementById('page-title').textContent = 'Duck Stock';
            }
            if (tab === 'history') {
                document.getElementById('page-title').textContent = '历史记录';
            }
        }

        // ==================== Position Calculation ====================
        function calculatePositions() {
            const trades = getTrades();
            const positions = {};

            trades.sort((a, b) => new Date(a.date) - new Date(b.date));

            trades.forEach(trade => {
                const code = trade.code;
                if (!positions[code]) {
                    positions[code] = {
                        code: code,
                        name: trade.name,
                        totalQuantity: 0,
                        totalCost: 0,
                        averageCost: 0,
                        realizedProfit: 0
                    };
                }

                const pos = positions[code];

                if (trade.type === 'buy') {
                    pos.totalCost += trade.price * trade.quantity;
                    pos.totalQuantity += trade.quantity;
                    pos.averageCost = pos.totalQuantity > 0 ? pos.totalCost / pos.totalQuantity : 0;
                } else {
                    const profit = (trade.price - pos.averageCost) * trade.quantity;
                    pos.realizedProfit += profit;
                    pos.totalQuantity -= trade.quantity;
                    pos.totalCost = pos.averageCost * pos.totalQuantity;

                    if (pos.totalQuantity <= 0) {
                        pos.totalQuantity = 0;
                        pos.totalCost = 0;
                        pos.averageCost = 0;
                    }
                }
            });

            return positions;
        }

        function getTradesWithAverageCost(stockCode) {
            const trades = getTrades().filter(t => t.code === stockCode);
            trades.sort((a, b) => new Date(a.date) - new Date(b.date));

            let totalQuantity = 0;
            let totalCost = 0;
            let averageCost = 0;

            return trades.map(trade => {
                const result = { ...trade, averageCost: averageCost };

                if (trade.type === 'buy') {
                    totalCost += trade.price * trade.quantity;
                    totalQuantity += trade.quantity;
                    averageCost = totalQuantity > 0 ? totalCost / totalQuantity : 0;
                } else {
                    result.profit = (trade.price - averageCost) * trade.quantity;
                    totalQuantity -= trade.quantity;
                    totalCost = averageCost * totalQuantity;
                    if (totalQuantity <= 0) averageCost = 0;
                }

                return result;
            }).reverse();
        }

        // ==================== Render Portfolio ====================
        function renderPortfolio() {
            const positions = calculatePositions();
            const prices = getPrices();
            const hiddenStocks = getHiddenStocks();

            // 活跃持仓（数量>0 且未隐藏）
            const activeStocks = Object.values(positions).filter(pos =>
                pos.totalQuantity > 0 && !hiddenStocks.includes(pos.code)
            );

            // 计算总成本
            let totalCost = 0;
            let totalMarketValue = 0;
            let totalProfit = 0;

            activeStocks.forEach(pos => {
                const price = prices[pos.code] || 0;
                const cost = pos.averageCost * pos.totalQuantity;
                const marketValue = price * pos.totalQuantity;
                totalCost += cost;
                totalMarketValue += marketValue;
                totalProfit += marketValue - cost;
            });

            const totalProfitPercent = totalCost > 0 ? (totalProfit / totalCost) * 100 : 0;

            // 汇总
            document.getElementById('portfolio-summary').innerHTML = `
                <div class="summary-card">
                    <div class="summary-row">
                        <span class="summary-label">总成本</span>
                        <span class="summary-value">$${formatNumber(totalCost)}</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">总市值</span>
                        <span class="summary-value">$${formatNumber(totalMarketValue)}</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">持仓盈亏</span>
                        <span class="summary-value ${totalProfit >= 0 ? 'profit' : 'loss'}">
                            $${formatNumber(totalProfit)} (${totalProfitPercent >= 0 ? '+' : ''}${totalProfitPercent.toFixed(2)}%)
                        </span>
                    </div>
                </div>
            `;

            // 持仓列表 - 按新顺序：平均成本 → 持仓数量 → 总成本 → 现价 → 市值 → 持仓盈亏
            const listHtml = activeStocks.map(pos => {
                const price = prices[pos.code] || 0;
                const totalCostSingle = pos.averageCost * pos.totalQuantity;
                const marketValue = price * pos.totalQuantity;
                const profit = marketValue - totalCostSingle;
                const profitPercent = totalCostSingle > 0 ? (profit / totalCostSingle) * 100 : 0;

                return `
                    <div class="stock-card" onclick="showStockDetail('${pos.code}')">
                        <div class="stock-header">
                            <span>
                                <span class="stock-name">${pos.name}</span>
                                <span class="stock-code">${pos.code}</span>
                            </span>
                        </div>
                        <div class="stock-info">
                            <div class="stock-info-item">
                                <span class="stock-info-label">平均成本</span>
                                <span class="stock-info-value">$${pos.averageCost.toFixed(2)}</span>
                            </div>
                            <div class="stock-info-item">
                                <span class="stock-info-label">持仓数量</span>
                                <span class="stock-info-value">${formatNumber(pos.totalQuantity)} 股</span>
                            </div>
                            <div class="stock-info-item">
                                <span class="stock-info-label">总成本</span>
                                <span class="stock-info-value">$${formatNumber(totalCostSingle)}</span>
                            </div>
                            <div class="stock-info-item">
                                <span class="stock-info-label">现价 ($)</span>
                                <input type="number" class="price-input" value="${price}"
                                    onchange="updatePrice('${pos.code}', this.value)"
                                    onclick="event.stopPropagation()"
                                    placeholder="$0.00">
                            </div>
                            <div class="stock-info-item">
                                <span class="stock-info-label">市值</span>
                                <span class="stock-info-value">$${formatNumber(marketValue)}</span>
                            </div>
                            <div class="stock-info-item">
                                <span class="stock-info-label">持仓盈亏</span>
                                <span class="stock-info-value ${profit >= 0 ? 'profit' : 'loss'}">
                                    $${formatNumber(profit)} (${profitPercent >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('portfolio-list').innerHTML = listHtml;
            document.getElementById('portfolio-empty').style.display = activeStocks.length === 0 ? 'block' : 'none';
        }

        // ==================== Render History ====================
        function renderHistory() {
            const positions = calculatePositions();
            const hiddenStocks = getHiddenStocks();

            // 只显示已清仓的股票（持仓=0）
            const historyStocks = Object.values(positions).filter(pos => pos.totalQuantity === 0);

            const listHtml = historyStocks.map(pos => {
                const isHidden = hiddenStocks.includes(pos.code);

                return `
                    <div class="stock-card" onclick="showStockDetail('${pos.code}')">
                        <div class="stock-header">
                            <span>
                                <span class="stock-name">${pos.name}</span>
                                <span class="stock-code">${pos.code}</span>
                            </span>
                            <span class="stock-badge">已清仓</span>
                        </div>
                        <div class="stock-info">
                            <div class="stock-info-item">
                                <span class="stock-info-label">已实现盈亏</span>
                                <span class="stock-info-value ${pos.realizedProfit >= 0 ? 'profit' : 'loss'}">
                                    $${formatNumber(pos.realizedProfit)}
                                </span>
                            </div>
                        </div>
                        ${isHidden ? `
                            <div class="action-btns" style="margin-top: 12px;">
                                <button class="action-btn" onclick="event.stopPropagation(); restoreStock('${pos.code}')">恢复显示</button>
                                <button class="action-btn danger" onclick="event.stopPropagation(); deleteStockCompletely('${pos.code}')">彻底删除</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('history-list').innerHTML = listHtml;
            document.getElementById('history-empty').style.display = historyStocks.length === 0 ? 'block' : 'none';
        }

        // ==================== Add Trade ====================
        function addTrade(event) {
            event.preventDefault();

            const name = document.getElementById('stock-name').value.trim();
            const code = document.getElementById('stock-code').value.trim().toUpperCase();
            const type = document.getElementById('trade-type').value;
            const price = parseFloat(document.getElementById('trade-price').value);
            const quantity = parseInt(document.getElementById('trade-quantity').value);
            const date = document.getElementById('trade-date').value;

            if (!name || !code || !price || !quantity || !date) {
                showToast('请填写所有必填项');
                return;
            }

            // 卖出数量校验
            if (type === 'sell') {
                const positions = calculatePositions();
                const pos = positions[code];
                const currentQty = pos ? pos.totalQuantity : 0;

                if (quantity > currentQty) {
                    showToast(`卖出数量不能超过当前持仓 (${currentQty}股)`);
                    return;
                }
            }

            // 保存交易
            const trades = getTrades();
            trades.push({
                id: Date.now(),
                name: name,
                code: code,
                type: type,
                price: price,
                quantity: quantity,
                date: date
            });
            saveTrades(trades);

            // 初始化现价
            const prices = getPrices();
            if (!prices[code]) {
                prices[code] = price;
                savePrices(prices);
            }

            // 重置表单
            document.getElementById('trade-form').reset();
            document.getElementById('trade-date').value = new Date().toISOString().split('T')[0];

            showToast('交易记录已添加');
            renderPortfolio();
            switchTab('portfolio');
        }

        // ==================== Update Price ====================
        function updatePrice(code, price) {
            const prices = getPrices();
            prices[code] = parseFloat(price) || 0;
            savePrices(prices);
            renderPortfolio();
        }

        // ==================== Delete Trade ====================
        function deleteTrade(id) {
            showConfirm('确认删除', '确定要删除这条交易记录吗？', () => {
                let trades = getTrades();
                const tradeToDelete = trades.find(t => t.id === id);
                trades = trades.filter(t => t.id !== id);
                saveTrades(trades);

                // 检查是否需要隐藏
                const positions = calculatePositions();
                if (tradeToDelete) {
                    const pos = positions[tradeToDelete.code];
                    if (pos && pos.totalQuantity === 0) {
                        const hidden = getHiddenStocks();
                        if (!hidden.includes(tradeToDelete.code)) {
                            hidden.push(tradeToDelete.code);
                            saveHiddenStocks(hidden);
                        }
                    }
                }

                renderPortfolio();
                renderHistory();
                showToast('交易记录已删除');
            });
        }

        // ==================== Delete Stock Completely ====================
        function deleteStockCompletely(code) {
            showConfirm('彻底删除', `确定要删除 ${code} 的所有交易记录吗？此操作不可恢复！`, () => {
                let trades = getTrades();
                trades = trades.filter(t => t.code !== code);
                saveTrades(trades);

                const prices = getPrices();
                delete prices[code];
                savePrices(prices);

                const hidden = getHiddenStocks();
                const idx = hidden.indexOf(code);
                if (idx !== -1) {
                    hidden.splice(idx, 1);
                    saveHiddenStocks(hidden);
                }

                renderHistory();
                showToast('已彻底删除');
            });
        }

        // ==================== Restore Stock ====================
        function restoreStock(code) {
            const hidden = getHiddenStocks();
            const idx = hidden.indexOf(code);
            if (idx !== -1) {
                hidden.splice(idx, 1);
                saveHiddenStocks(hidden);
            }
            renderHistory();
            renderPortfolio();
            showToast('已恢复显示');
        }

        // ==================== Stock Detail ====================
        let currentChart = null;

        function showStockDetail(code) {
            const positions = calculatePositions();
            const pos = positions[code];
            const prices = getPrices();
            const price = prices[code] || 0;
            const hiddenStocks = getHiddenStocks();
            const isHidden = hiddenStocks.includes(code);

            const trades = getTradesWithAverageCost(code);

            // 计算已实现盈亏
            let realizedProfit = 0;
            trades.forEach(t => {
                if (t.type === 'sell' && t.profit !== undefined) {
                    realizedProfit += t.profit;
                }
            });

            // 交易记录列表 - 每笔交易显示盈亏（买入+$0，卖出显示实际盈亏）
            const tradesHtml = trades.map(t => {
                let profitDisplay = '';
                if (t.type === 'buy') {
                    profitDisplay = '<span class="profit">+$0</span>';
                } else if (t.type === 'sell' && t.profit !== undefined) {
                    const sign = t.profit >= 0 ? '+' : '';
                    profitDisplay = `<span class="${t.profit >= 0 ? 'profit' : 'loss'}">$${sign}${formatNumber(t.profit)}</span>`;
                } else {
                    profitDisplay = '<span style="color: var(--text-secondary);">—</span>';
                }

                return `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-date">${formatDate(t.date)}</div>
                            <div class="transaction-details">
                                <span class="transaction-type ${t.type}">${t.type === 'buy' ? '买入' : '卖出'}</span>
                                ${t.quantity}股 @ $${t.price.toFixed(2)}
                            </div>
                        </div>
                        <div class="transaction-profit">
                            ${profitDisplay}
                        </div>
                        <button class="delete-btn" onclick="deleteTrade(${t.id}); showStockDetail('${code}');">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                            </svg>
                        </button>
                    </div>
                `;
            }).join('');

            const marketValue = price * (pos ? pos.totalQuantity : 0);
            const totalCost = (pos ? pos.averageCost : 0) * (pos ? pos.totalQuantity : 0);
            const profit = marketValue - totalCost;
            const profitPercent = totalCost > 0 ? (profit / totalCost) * 100 : 0;

            // 按新顺序：平均成本 → 持仓数量 → 总成本 → 现价 → 市值 → 持仓盈亏
            const content = `
                <div class="form-title">${pos ? pos.name : code} (${code})</div>
                ${!pos || pos.totalQuantity === 0 ? '<span class="stock-badge" style="display:inline-block;margin-bottom:16px;">已清仓</span>' : ''}

                <div class="summary-card" style="margin-bottom: 16px;">
                    <div class="summary-row">
                        <span class="summary-label">累计已实现盈亏</span>
                        <span class="summary-value ${realizedProfit >= 0 ? 'profit' : 'loss'}">
                            $${formatNumber(realizedProfit)}
                        </span>
                    </div>
                </div>

                <div class="stock-info" style="margin-bottom: 16px;">
                    <div class="stock-info-item">
                        <span class="stock-info-label">平均成本</span>
                        <span class="stock-info-value">$${pos ? pos.averageCost.toFixed(2) : '0.00'}</span>
                    </div>
                    <div class="stock-info-item">
                        <span class="stock-info-label">持仓数量</span>
                        <span class="stock-info-value">${pos ? formatNumber(pos.totalQuantity) : 0} 股</span>
                    </div>
                    <div class="stock-info-item">
                        <span class="stock-info-label">总成本</span>
                        <span class="stock-info-value">$${formatNumber(totalCost)}</span>
                    </div>
                    <div class="stock-info-item">
                        <span class="stock-info-label">现价 ($)</span>
                        <input type="number" class="price-input" value="${price}"
                            onchange="updatePrice('${code}', this.value); showStockDetail('${code}');"
                            placeholder="$0.00" style="width: 100%;">
                    </div>
                    <div class="stock-info-item">
                        <span class="stock-info-label">市值</span>
                        <span class="stock-info-value">$${formatNumber(marketValue)}</span>
                    </div>
                    <div class="stock-info-item">
                        <span class="stock-info-label">持仓盈亏</span>
                        <span class="stock-info-value ${profit >= 0 ? 'profit' : 'loss'}">
                            $${formatNumber(profit)} (${profitPercent >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)
                        </span>
                    </div>
                </div>

                ${isHidden && (!pos || pos.totalQuantity === 0) ? `
                    <button class="action-btn" style="width:100%;margin-bottom:16px;" onclick="restoreStock('${code}'); closeDetailModal();">
                        恢复显示
                    </button>
                ` : ''}

                <div class="form-title">交易记录</div>
                <div class="transaction-list" style="margin-bottom: 16px;">
                    ${tradesHtml}
                </div>

                <div class="chart-container">
                    <div class="chart-title">成本曲线</div>
                    <select class="period-btn" style="width:100%;margin-bottom:12px;" onchange="renderChart('${code}', this.value)">
                        <option value="month">近一个月</option>
                        <option value="quarter">近三个月</option>
                        <option value="half">近半年</option>
                        <option value="year">近一年</option>
                    </select>
                    <div style="height: 250px;">
                        <canvas id="cost-chart"></canvas>
                    </div>
                </div>

                <button class="action-btn danger" style="width:100%;" onclick="deleteStockCompletely('${code}'); closeDetailModal();">
                    彻底删除
                </button>
            `;

            document.getElementById('detail-content').innerHTML = content;
            document.getElementById('detail-modal').classList.add('active');

            renderChart(code, 'month');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.remove('active');
            renderPortfolio();
        }

        // ==================== Chart ====================
        function renderChart(code, period) {
            const trades = getTrades().filter(t => t.code === code);
            trades.sort((a, b) => new Date(a.date) - new Date(b.date));

            const now = new Date();
            let startDate = new Date(now.getFullYear(), now.getMonth(), 1);

            if (period === 'quarter') startDate = new Date(now.getFullYear(), now.getMonth() - 3, now.getDate());
            else if (period === 'half') startDate = new Date(now.getFullYear(), now.getMonth() - 6, now.getDate());
            else if (period === 'year') startDate = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());

            const filteredTrades = trades.filter(t => new Date(t.date) >= startDate);

            const labels = [];
            const costData = [];
            const quantityData = [];

            let totalQuantity = 0;
            let totalCost = 0;
            let averageCost = 0;

            filteredTrades.forEach(trade => {
                if (trade.type === 'buy') {
                    totalCost += trade.price * trade.quantity;
                    totalQuantity += trade.quantity;
                    averageCost = totalQuantity > 0 ? totalCost / totalQuantity : 0;
                } else {
                    totalQuantity -= trade.quantity;
                    totalCost = averageCost * totalQuantity;
                    if (totalQuantity <= 0) {
                        totalQuantity = 0;
                        totalCost = 0;
                        averageCost = 0;
                    }
                }

                labels.push(trade.date);
                costData.push(averageCost);
                quantityData.push(totalQuantity);
            });

            if (currentChart) {
                currentChart.destroy();
            }

            const ctx = document.getElementById('cost-chart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '平均成本',
                            data: costData,
                            borderColor: '#FF3B30',
                            backgroundColor: 'rgba(255, 59, 48, 0.1)',
                            yAxisID: 'y',
                            tension: 0.3,
                            fill: false,
                            pointRadius: 3
                        },
                        {
                            label: '持仓数量',
                            data: quantityData,
                            type: 'bar',
                            backgroundColor: 'rgba(0, 122, 255, 0.5)',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '平均成本 ($)' },
                            min: 0
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '持仓数量' },
                            grid: { drawOnChartArea: false },
                            min: 0
                        }
                    }
                }
            });
        }

        // ==================== Import/Export ====================
        function showImportExport() {
            document.getElementById('data-modal').classList.add('active');
            hideImport();
        }

        function closeDataModal() {
            document.getElementById('data-modal').classList.remove('active');
        }

        function showImport() {
            document.getElementById('import-section').style.display = 'block';
        }

        function hideImport() {
            document.getElementById('import-section').style.display = 'none';
            document.getElementById('import-data').value = '';
        }

        function exportData() {
            const data = {
                duckStockTrades: getTrades(),
                duckStockPrices: getPrices(),
                duckHiddenStocks: getHiddenStocks(),
                exportTime: new Date().toISOString()
            };

            const jsonStr = JSON.stringify(data, null, 2);

            navigator.clipboard.writeText(jsonStr).then(() => {
                showToast('数据已复制到剪贴板');
            }).catch(() => {
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `duck-stock-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('数据已下载');
            });
        }

        function importData() {
            const jsonStr = document.getElementById('import-data').value.trim();

            if (!jsonStr) {
                showToast('请输入数据');
                return;
            }

            try {
                const data = JSON.parse(jsonStr);

                if (data.duckStockTrades) saveTrades(data.duckStockTrades);
                if (data.duckStockPrices) savePrices(data.duckStockPrices);
                if (data.duckHiddenStocks) saveHiddenStocks(data.duckHiddenStocks);

                closeDataModal();
                renderPortfolio();
                renderHistory();
                showToast('数据导入成功');
            } catch (e) {
                showToast('数据格式错误');
            }
        }

        // ==================== Clear All ====================
        function clearAllData() {
            showConfirm('清空所有数据', '确定要清空所有数据吗？此操作不可恢复！', () => {
                localStorage.removeItem(KEYS.trades);
                localStorage.removeItem(KEYS.prices);
                localStorage.removeItem(KEYS.hidden);
                closeDataModal();
                renderPortfolio();
                renderHistory();
                showToast('所有数据已清空');
            });
        }

        // ==================== Confirm Modal ====================
        let confirmCallback = null;

        function showConfirm(title, message, callback) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            confirmCallback = callback;
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('active');
            confirmCallback = null;
        }

        function confirmAction() {
            if (confirmCallback) confirmCallback();
            closeConfirmModal();
        }

        // ==================== Toast ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== Utilities ====================
        function formatNumber(num) {
            return num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }
    </script>
</body>
</html>
